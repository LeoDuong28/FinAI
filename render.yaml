services:
  - type: web
    name: finai-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: SERVER_PORT
        value: "8080"
      - key: PLAID_ENV
        value: sandbox
      - key: AI_SERVICE_URL
        sync: false
      - key: AI_SERVICE_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false

